<VirtualHost *:80>
    ServerName careflow.stage.dev

    Header always set X-Robots-Tag "noindex, nofollow"

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8097/
    ProxyPassReverse / http://127.0.0.1:8097/

    ErrorLog ${APACHE_LOG_DIR}/careflow.stage.dev-error.log
    CustomLog ${APACHE_LOG_DIR}/careflow.stage.dev-access.log combined
</VirtualHost>
