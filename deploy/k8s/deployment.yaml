apiVersion: apps/v1
kind: Deployment
metadata:
  name: careflow
  labels:
    app.kubernetes.io/name: careflow
    app.kubernetes.io/part-of: healthcare-workflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: careflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: careflow
    spec:
      containers:
        - name: careflow
          image: ghcr.io/skyyware/careflow:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
