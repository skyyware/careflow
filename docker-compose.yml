services:
  app:
    build:
      context: .
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/q/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:v25.1.4
    profiles: ["event-stream"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
